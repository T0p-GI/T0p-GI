<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberCore Arena — T Level Digital Support & Security Revision</title>
  <meta name="description" content="A gamified revision arena for the Pearson T Level Digital Support & Security Core Paper 1, covering CO1 Problem Solving, CO2 Digital Support and CO3 Emerging Issues." />

  <!-- Correct path to your stylesheet (root folder) -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- Animated cyber background layers -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="app">
    <!-- Sidebar / Topic Navigator -->
    <aside class="sidebar" id="sidebar">
      <div class="brand" id="brand" title="Go to dashboard">
        <span class="logo">⚡</span>
        <div>
          <h1>CyberCore <span class="neon-text">Arena</span></h1>
          <small>T LEVEL · DIGITAL SUPPORT &amp; SECURITY</small>
        </div>
      </div>

      <!-- Navigation is injected by app.js -->
      <nav id="nav"></nav>
    </aside>

    <!-- Main content area -->
    <main class="main">
      <div class="topbar">
        <button class="btn ghost small menu-toggle" id="menu-toggle">☰ Topics</button>
        <span class="spacer"></span>
      </div>

      <!-- Active view is rendered here by app.js -->
      <section id="view"></section>
    </main>
  </div>

  <!-- Toast / XP popups -->
  <div class="toast-wrap" id="toasts" aria-live="polite"></div>

  <!-- Scripts: data first (defines window.CYBERCORE), then the app -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
